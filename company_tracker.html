<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Industry Firm Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a237e;--navy-light:#283593;--white:#ffffff;--gray-50:#fafafa;--gray-100:#f5f5f5;
  --gray-200:#eeeeee;--gray-300:#e0e0e0;--gray-400:#bdbdbd;--gray-600:#757575;--gray-700:#616161;--gray-800:#424242;
  --blue:#1565c0;--purple:#7b1fa2;--teal:#00838f;--orange:#ef6c00;--red:#c62828;--green:#2e7d32;--slate:#455a64;
  --star-gold:#ffc107;
  --sidebar-w:300px;--header-h:64px;--tab-h:46px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--gray-100);color:var(--gray-800);line-height:1.5}
/* HEADER */
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header h1{font-size:1.35rem;font-weight:700;letter-spacing:.5px}
.header-left{display:flex;align-items:center;gap:12px}
.header-sub{font-size:.8rem;opacity:.85;margin-left:4px;font-weight:400}
.header-right{display:flex;align-items:center;gap:10px}
.header-right .filter-count{background:rgba(255,255,255,.18);padding:3px 12px;border-radius:12px;font-size:.75rem}
.btn{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:.8rem;font-weight:600;transition:background .2s}
.btn-light{background:rgba(255,255,255,.15);color:#fff}.btn-light:hover{background:rgba(255,255,255,.25)}
.btn-sm{padding:4px 10px;font-size:.75rem}
.menu-toggle{display:none;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;padding:4px 8px}
/* TAB BAR */
.tab-bar{position:fixed;top:var(--header-h);left:0;right:0;display:flex;gap:0;background:#1a237e;padding:0 24px;border-bottom:2px solid #0d1442;z-index:99}
.tab-btn{padding:12px 24px;border:none;background:transparent;color:rgba(255,255,255,0.6);font-size:0.9rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s}
.tab-btn:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.05)}
.tab-btn.active{color:#fff;border-bottom-color:#ffc107;background:rgba(255,255,255,0.08)}
/* LAYOUT */
.layout{display:flex;margin-top:calc(var(--header-h) + var(--tab-h));min-height:calc(100vh - var(--header-h) - var(--tab-h))}
/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid var(--gray-300);padding:20px 16px;overflow-y:auto;position:sticky;top:calc(var(--header-h) + var(--tab-h));height:calc(100vh - var(--header-h) - var(--tab-h));transition:transform .3s}
.sidebar h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-600);margin:16px 0 6px;border-bottom:1px solid var(--gray-200);padding-bottom:4px}
.sidebar h3:first-child{margin-top:0}
.sidebar input[type=text]{width:100%;padding:8px 10px;border:1px solid var(--gray-300);border-radius:4px;font-size:.85rem;outline:none}
.sidebar input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(21,101,192,.15)}
.sidebar select{width:100%;padding:8px 10px;border:1px solid var(--gray-300);border-radius:4px;font-size:.85rem;background:#fff}
.cb-group{display:flex;flex-direction:column;gap:3px}
.cb-group label{display:flex;align-items:center;gap:6px;font-size:.82rem;cursor:pointer;padding:2px 0}
.cb-group input[type=checkbox]{accent-color:var(--blue)}
.clear-btn{width:100%;margin-top:16px;padding:8px;background:var(--gray-200);border:1px solid var(--gray-300);border-radius:4px;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--gray-700)}
.clear-btn:hover{background:var(--gray-300)}
.category-select{font-size:.9rem;font-weight:600;padding:10px;border:2px solid var(--navy);border-radius:6px;background:#f0f2ff;color:var(--navy);margin-bottom:8px}
.sidebar-section{display:none}
.sidebar-section.visible{display:block}
/* MAIN CONTENT */
.main{flex:1;padding:20px 24px;overflow-x:auto;min-width:0}
/* STATS BAR */
.stats-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:6px;padding:10px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);min-width:100px}
.stat-card .stat-value{font-size:1.3rem;font-weight:700;color:var(--navy)}
.stat-card .stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-600);margin-top:1px}
/* TABLE */
.table-wrap{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead{background:var(--navy-light);color:#fff;position:sticky;top:0;z-index:10}
th{padding:9px 10px;text-align:left;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;font-size:.74rem;text-transform:uppercase;letter-spacing:.4px}
th:hover{background:var(--navy)}
th .sort-arrow{margin-left:3px;font-size:.65rem;opacity:.5}
th .sort-arrow.active{opacity:1}
th.no-sort{cursor:default}
th.no-sort:hover{background:var(--navy-light)}
td{padding:8px 10px;border-bottom:1px solid var(--gray-200);vertical-align:middle}
tr.data-row{cursor:pointer;transition:background .15s}
tr.data-row:nth-child(even of .data-row){background:var(--gray-50)}
tr.data-row:hover{background:#e3f2fd}
.row-num{color:var(--gray-600);font-size:.75rem;min-width:28px;text-align:center}
.category-label{display:block;font-size:.65rem;color:var(--gray-600);font-weight:400;margin-top:1px}
/* FIRM TYPE BADGES */
.firmtype-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;white-space:nowrap}
.firmtype-actuarial{background:#1565c0;color:#fff}
.firmtype-broker{background:#7b1fa2;color:#fff}
.firmtype-big4{background:#00695c;color:#fff}
.firmtype-reinsurance{background:#e65100;color:#fff}
.firmtype-tpa{background:#283593;color:#fff}
.firmtype-healthcare{background:#2e7d32;color:#fff}
.firmtype-proforg{background:#546e7a;color:#fff}
/* FOCUS AREA TAGS */
.focus-tags{display:flex;flex-wrap:wrap;gap:3px}
.focus-tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:.65rem;font-weight:600;color:#fff;white-space:nowrap;line-height:1.5}
.tag-pension{background:#1565c0}
.tag-life{background:#7b1fa2}
.tag-pc{background:#c62828}
.tag-health{background:#2e7d32}
.tag-reins{background:#ef6c00}
.tag-erm{background:#00838f}
.tag-ma{background:#455a64}
/* TAG BUTTONS */
.tag-btn{background:none;border:none;cursor:pointer;font-size:1.1rem;padding:0 4px;transition:color .15s;line-height:1}
.comment-box{width:100%;padding:4px 6px;border:1px solid #e0e0e0;border-radius:4px;font-size:.75rem;font-family:inherit;resize:vertical;background:#fafafa;color:#424242;line-height:1.4}
.comment-box:focus{border-color:#1565c0;outline:none;background:#fff;box-shadow:0 0 0 2px rgba(21,101,192,.12)}
.tag-none{color:#bdbdbd}
.tag-potential{color:#1565c0}
.tag-top{color:#ffc107}
tr.data-row.tagged-top{border-left:3px solid #ffc107}
tr.data-row.tagged-potential{border-left:3px solid #1565c0}
/* SOURCED VALUE */
.sourced-value{position:relative;white-space:nowrap}
.source-icon{font-size:.7rem;color:var(--blue);margin-left:3px;cursor:pointer;opacity:.6;transition:opacity .15s}
.sourced-value:hover .source-icon{opacity:1}
.source-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--gray-300);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:8px 10px;z-index:50;min-width:160px;max-width:260px}
.source-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--gray-300)}
.sourced-value:hover .source-tooltip{display:block}
.source-tooltip a{display:block;color:var(--blue);text-decoration:none;font-size:.78rem;padding:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-tooltip a:hover{text-decoration:underline}
.source-tooltip .st-label{font-size:.68rem;color:var(--gray-600);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
/* EXPANDED ROW */
tr.detail-row td{padding:0;border-bottom:2px solid var(--gray-300)}
.detail-content{padding:16px 24px;background:#fafbff;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:800px}}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.detail-section h4{font-size:.82rem;color:var(--navy);margin-bottom:8px;border-bottom:1px solid var(--gray-200);padding-bottom:4px}
.detail-section p,.detail-section a{font-size:.82rem}
.detail-section a{color:var(--blue);text-decoration:none}
.detail-section a:hover{text-decoration:underline}
.detail-section .detail-row-item{margin-bottom:6px}
.detail-section .detail-label{font-weight:600;color:var(--gray-700);font-size:.75rem;text-transform:uppercase;letter-spacing:.3px}
.detail-section .detail-val{margin-top:1px}
.source-link-list a{display:block;padding:2px 0;font-size:.8rem}
.news-btn{display:inline-block;margin-top:8px;padding:6px 14px;background:var(--navy);color:#fff;border:none;border-radius:4px;font-size:.8rem;cursor:pointer;text-decoration:none;font-weight:600}
.news-btn:hover{background:var(--navy-light)}
.detail-practice-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.detail-practice-tags .focus-tag{font-size:.72rem;padding:2px 10px}
/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-700)}
.empty-state p:first-child{font-size:1rem;font-weight:600;margin-bottom:6px}
/* MOBILE */
@media(max-width:900px){
  .menu-toggle{display:block}
  .sidebar{position:fixed;top:calc(var(--header-h) + var(--tab-h));left:0;bottom:0;z-index:90;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.2)}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:85}
  .overlay.show{display:block}
  .main{padding:12px}
  .detail-grid{grid-template-columns:1fr}
  .focus-tags{flex-direction:column;align-items:flex-start}
  .stats-bar{gap:6px}
  .stat-card{min-width:80px;padding:8px 12px}
  .stat-card .stat-value{font-size:1.1rem}
  .header h1{font-size:1.1rem}
  .tab-bar{padding:0 8px}
  .tab-btn{padding:10px 14px;font-size:.8rem}
}
@media(max-width:600px){
  .header{padding:0 12px}
  .header-sub{display:none}
}
</style>
</head>

<div class="header">
  <div class="header-left">
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">&#9776;</button>
    <h1>Industry Firm Tracker<span class="header-sub" id="headerSub"></span></h1>
  </div>
  <div class="header-right">
    <span class="filter-count" id="filterCount"></span>
    <button class="btn btn-light btn-sm" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-light btn-sm" onclick="exportJSON()">Export JSON</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('actuarial')">Actuarial Firms</button>
  <button class="tab-btn" onclick="switchTab('hl')">Houlihan Lokey Firms</button>
  <button class="tab-btn" onclick="switchTab('other')">Other Firms of Interest</button>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section visible" id="sidebarCategory">
      <h3>Category</h3>
      <select class="category-select" id="categoryFilter" onchange="applyFilters()">
        <option value="">All Categories</option>
      </select>
    </div>

    <div class="sidebar-section visible" id="sidebarSearch">
      <h3>Search</h3>
      <input type="text" id="searchInput" placeholder="Search firms..." oninput="applyFilters()">
    </div>

    <div class="sidebar-section visible" id="sidebarFirmType">
      <h3>Firm Type</h3>
      <div class="cb-group" id="firmTypeFilters"></div>
    </div>

    <div class="sidebar-section visible" id="sidebarCountry">
      <h3>Country</h3>
      <div class="cb-group" id="countryFilters"></div>
    </div>

    <div class="sidebar-section visible" id="sidebarFocus">
      <h3>Focus Areas</h3>
      <div class="cb-group" id="focusFilters"></div>
    </div>

    <div class="sidebar-section visible" id="sidebarOwnership">
      <h3>Ownership Type</h3>
      <div class="cb-group" id="ownershipFilters"></div>
    </div>

    <div class="sidebar-section visible" id="sidebarSize">
      <h3>Firm Size</h3>
      <select id="sizeFilter" onchange="applyFilters()">
        <option value="">All Sizes</option>
        <option value="small">Small (&lt;50)</option>
        <option value="medium">Medium (50-500)</option>
        <option value="large">Large (500-5,000)</option>
        <option value="enterprise">Enterprise (5,000+)</option>
      </select>
    </div>

    <div class="sidebar-section visible" id="sidebarPriority">
      <h3>Priority</h3>
      <div class="cb-group">
        <label><input type="checkbox" id="filterTopPriority" onchange="applyFilters()"> Top Priority &#9733;</label>
        <label><input type="checkbox" id="filterPotential" onchange="applyFilters()"> Potential &#9679;</label>
      </div>
    </div>

    <button class="clear-btn" onclick="clearFilters()">Clear All Filters</button>
  </aside>

  <div class="main">
    <div class="stats-bar" id="statsBar"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr id="tableHead"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

// ===== HELPERS =====
function parseNum(str) {
  if (!str || str === '\u2014' || str === 'Not disclosed') return 0;
  const cleaned = str.replace(/[^0-9.\-]/g, '');
  const parts = cleaned.split('-');
  if (parts.length === 2) return (parseFloat(parts[0]) + parseFloat(parts[1])) / 2;
  return parseFloat(cleaned) || 0;
}

function parseRevenue(str) {
  if (!str || str === '\u2014') return 0;
  const m = str.match(/([\d.]+)\s*(B|M|K)?/i);
  if (!m) return 0;
  let val = parseFloat(m[1]);
  if (m[2]) {
    const u = m[2].toUpperCase();
    if (u === 'B') val *= 1000000000;
    else if (u === 'M') val *= 1000000;
    else if (u === 'K') val *= 1000;
  }
  return val;
}

function parseEmployeeNum(str) {
  if (!str || str === '\u2014' || str === 'Not disclosed') return 0;
  const cleaned = str.replace(/[~,+]/g, '');
  const parts = cleaned.match(/(\d[\d,]*)/g);
  if (!parts) return 0;
  if (parts.length >= 2) return (parseInt(parts[0].replace(/,/g,'')) + parseInt(parts[1].replace(/,/g,''))) / 2;
  return parseInt(parts[0].replace(/,/g,'')) || 0;
}

function getOwnershipType(own) {
  const o = own.toLowerCase();
  if (o.includes('employee-owned')) return 'Employee-Owned';
  if (o.includes('public') || o.includes('nyse') || o.includes('nasdaq')) return 'Public';
  if (o.includes('subsidiary') || o.includes('acquired')) return 'Subsidiary';
  if (o.includes('partnership')) return 'Partnership';
  return 'Private';
}

function firmTypeClass(ft) {
  if (ft === 'Insurance Broker') return 'firmtype-broker';
  if (ft === 'Big 4 / Accounting') return 'firmtype-big4';
  if (ft === 'Reinsurance Broker') return 'firmtype-reinsurance';
  if (ft === 'TPA / Benefits Admin') return 'firmtype-tpa';
  if (ft === 'Healthcare Consulting') return 'firmtype-healthcare';
  if (ft === 'Professional Organization') return 'firmtype-proforg';
  return 'firmtype-actuarial';
}

function firmTypeSortVal(ft) {
  const order = {'Actuarial Consulting':1, 'Insurance Broker':2, 'Big 4 / Accounting':3, 'Reinsurance Broker':4, 'TPA / Benefits Admin':5, 'Healthcare Consulting':6, 'Professional Organization':7};
  return order[ft] || 99;
}

function getSizeCategory(emp) {
  const n = parseEmployeeNum(emp);
  if (n === 0) return 'small';
  if (n < 50) return 'small';
  if (n < 500) return 'medium';
  if (n < 5000) return 'large';
  return 'enterprise';
}

function cycleTag(name, event) {
  event.stopPropagation();
  const current = tags[name];
  if (!current) tags[name] = "potential";
  else if (current === "potential") tags[name] = "top";
  else delete tags[name];
  localStorage.setItem("firm_tags", JSON.stringify(tags));
  render();
}

function sourcedValueHTML(value, sources) {
  if (!sources || sources.length === 0) return escHTML(value);
  let tooltip = '<span class="source-tooltip">';
  sources.forEach(s => {
    tooltip += '<a href="' + escHTML(s.url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + escHTML(s.label) + ' \u2197</a>';
  });
  tooltip += '</span>';
  return '<span class="sourced-value">' + escHTML(value) + '<span class="source-icon">\u2197</span>' + tooltip + '</span>';
}

function escHTML(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function focusTagsHTML(pa, full) {
  let html = '';
  for (const [key, cfg] of Object.entries(practiceAreaConfig)) {
    if (pa[key]) {
      const label = full ? cfg.full : cfg.short;
      html += '<span class="focus-tag ' + cfg.cls + '">' + label + '</span>';
    }
  }
  return html;
}

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[onclick="switchTab(\'' + tab + '\')"]').classList.add('active');

  // Rebuild sidebar filters for this tab
  initFilters();
  renderHead();
  applyFilters();
}

// ===== FILTERING =====
function getFiltered() {
  const firms = getCurrentFirms();
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const checkedCountries = [...document.querySelectorAll('#countryFilters input:checked')].map(i => i.value);
  const checkedOwn = [...document.querySelectorAll('#ownershipFilters input:checked')].map(i => i.value);
  const sizeFilter = document.getElementById('sizeFilter').value;
  const showTop = document.getElementById('filterTopPriority').checked;
  const showPotential = document.getElementById('filterPotential').checked;

  // Actuarial-specific filters
  let cat = '';
  let checkedFirmTypes = [];
  let checkedFocus = [];
  if (currentTab === 'actuarial') {
    cat = document.getElementById('categoryFilter').value;
    checkedFirmTypes = [...document.querySelectorAll('#firmTypeFilters input:checked')].map(i => i.value);
    checkedFocus = [...document.querySelectorAll('#focusFilters input:checked')].map(i => i.value);
  }

  return firms.filter(f => {
    // Search
    if (search) {
      const searchFields = [f.name, f.hq, f.ownership, f.notes || ''];
      if (f.description) searchFields.push(f.description);
      if (!searchFields.some(field => field.toLowerCase().includes(search))) return false;
    }

    // Country
    if (checkedCountries.length > 0 && !checkedCountries.includes(f.country)) return false;

    // Ownership
    if (!checkedOwn.includes(getOwnershipType(f.ownership))) return false;

    // Size
    if (sizeFilter && getSizeCategory(f.employees) !== sizeFilter) return false;

    // Priority
    if (showTop || showPotential) {
      const t = tags[f.name];
      if (showTop && showPotential) { if (t !== 'top' && t !== 'potential') return false; }
      else if (showTop) { if (t !== 'top') return false; }
      else if (showPotential) { if (t !== 'potential') return false; }
    }

    // Actuarial-specific
    if (currentTab === 'actuarial') {
      if (cat && f.category !== cat) return false;
      if (checkedFirmTypes.length > 0 && !checkedFirmTypes.includes(f.firmType)) return false;
      if (checkedFocus.length > 0 && !checkedFocus.some(k => f.practiceAreas[k])) return false;
    }

    return true;
  });
}

// ===== SORTING =====
function sortFirms(list) {
  return [...list].sort((a, b) => {
    let va, vb;
    switch (sortCol) {
      case 'name': va = a.name.toLowerCase(); vb = b.name.toLowerCase(); break;
      case 'firmType': va = firmTypeSortVal(a.firmType || ''); vb = firmTypeSortVal(b.firmType || ''); break;
      case 'hq': va = a.hq.toLowerCase(); vb = b.hq.toLowerCase(); break;
      case 'ownership': va = a.ownership.toLowerCase(); vb = b.ownership.toLowerCase(); break;
      case 'employees': va = parseEmployeeNum(a.employees); vb = parseEmployeeNum(b.employees); break;
      case 'actuaries': va = parseEmployeeNum(a.actuaries); vb = parseEmployeeNum(b.actuaries); break;
      case 'revenue': va = parseRevenue(a.revenue); vb = parseRevenue(b.revenue); break;
      case 'ebitda': va = parseRevenue(a.ebitda || ''); vb = parseRevenue(b.ebitda || ''); break;
      case 'rank': va = a.rank || 0; vb = b.rank || 0; break;
      case 'sector': va = (a.sector || '').toLowerCase(); vb = (b.sector || '').toLowerCase(); break;
      default: va = a.name.toLowerCase(); vb = b.name.toLowerCase();
    }
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
}

function setSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  render();
}

// ===== RENDER TABLE HEAD =====
function renderHead() {
  const columns = getCurrentColumns();
  const tr = document.getElementById('tableHead');
  tr.innerHTML = '';
  columns.forEach(col => {
    const th = document.createElement('th');
    if (!col.sortable) th.className = 'no-sort';
    let arrow = '';
    if (col.sortable) {
      const active = sortCol === col.key;
      const char = active ? (sortDir === 1 ? '\u25B2' : '\u25BC') : '\u25B2';
      arrow = ' <span class="sort-arrow' + (active ? ' active' : '') + '">' + char + '</span>';
      th.onclick = () => setSort(col.key);
    }
    th.innerHTML = col.label + arrow;
    tr.appendChild(th);
  });
}

  html += '<div class="stat-card"><div class="stat-value">' + total + '</div><div class="stat-label">Total Firms</div></div>';

  if (currentTab === 'actuarial') {

    const ftOrder = ['Actuarial Consulting','Insurance Broker','Big 4 / Accounting','Reinsurance Broker','TPA / Benefits Admin','Healthcare Consulting','Professional Organization'];
    ftOrder.forEach(ft => {
      const c = firmTypeCounts[ft] || 0;

    });
  }

  html += '<div class="stat-card"><div class="stat-value" style="color:#ffc107">' + topCount + '</div><div class="stat-label">Top Priority \u2605</div></div>';
  html += '<div class="stat-card"><div class="stat-value" style="color:#1565c0">' + potentialCount + '</div><div class="stat-label">Potential \u25CF</div></div>';

  if (currentTab === 'actuarial') {
    // Top focus areas
    const focusCounts = {};
    for (const key of Object.keys(practiceAreaConfig)) {
      focusCounts[key] = list.filter(f => f.practiceAreas[key]).length;
    }
    const topFocus = Object.entries(focusCounts).sort((a,b) => b[1] - a[1]).slice(0, 3);
    topFocus.forEach(([key, count]) => {
      if (count > 0) {
        html += '<div class="stat-card"><div class="stat-value">' + count + '</div><div class="stat-label">' + practiceAreaConfig[key].full + '</div></div>';

    });

  document.getElementById('statsBar').innerHTML = html;
}

  const tabLabel = currentTab === 'actuarial' ? 'Actuarial' : currentTab === 'hl' ? 'Houlihan Lokey' : 'Other';
  document.getElementById('headerSub').textContent = '';
  document.getElementById('filterCount').textContent = filtered.length + ' of ' + firms.length + ' ' + tabLabel + ' firms | ' + topCount + ' Top Priority | ' + potentialCount + ' Potential';
}

// ===== MAIN RENDER =====
function render() {
  const filtered = getFiltered();
  const sorted = sortFirms(filtered);
  renderHead();
  renderBody(sorted);
  renderStats(sorted);
  renderHeader(sorted);
}

function applyFilters() { render(); }

function clearFilters() {
  if (currentTab === 'actuarial') {
    document.getElementById('categoryFilter').value = '';
    document.querySelectorAll('#firmTypeFilters input').forEach(i => i.checked = true);
    document.querySelectorAll('#focusFilters input').forEach(i => i.checked = false);
  }
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('#countryFilters input').forEach(i => i.checked = true);
  document.querySelectorAll('#ownershipFilters input').forEach(i => i.checked = true);
  document.getElementById('sizeFilter').value = '';
  document.getElementById('filterTopPriority').checked = false;
  document.getElementById('filterPotential').checked = false;
  render();
}

// ===== EXPORT =====
function exportCSV() {
  const filtered = sortFirms(getFiltered());

  if (currentTab === 'actuarial') {
    const headers = ['Name','Category','Firm Type','HQ','Ownership','Employees','Actuaries','Revenue','Website','Practice Areas','Priority','Notes'];
    const rows = filtered.map(f => {
      const pa = Object.entries(f.practiceAreas).filter(([k,v]) => v).map(([k]) => practiceAreaConfig[k].full).join('; ');
      const priority = tags[f.name] === 'top' ? 'Top Priority' : tags[f.name] === 'potential' ? 'Potential' : '';
      return [f.name, f.category, f.firmType, f.hq, f.ownership, f.employees, f.actuaries, f.revenue, f.website, pa, priority, f.notes].map(v => '"' + (v||'').replace(/"/g,'""') + '"');
    });
    downloadCSV([headers.join(','), ...rows.map(r => r.join(','))].join('\n'));
  } else if (currentTab === 'hl') {
    const headers = ['Name','HQ','Country','Ownership','Employees','EBITDA','Revenue','Website','Description','Priority','My Notes','Notes'];
    const rows = filtered.map(f => {
      const priority = tags[f.name] === 'top' ? 'Top Priority' : tags[f.name] === 'potential' ? 'Potential' : '';
      return [f.name, f.hq, f.country, f.ownership, f.employees, f.ebitda||'', f.revenue, f.website, f.description||'', priority, comments[f.name]||'', f.notes||''].map(v => '"' + (v||'').replace(/"/g,'""') + '"');
    });
    downloadCSV([headers.join(','), ...rows.map(r => r.join(','))].join('\n'));
  } else {
    const headers = ['Name','HQ','Country','Ownership','Employees','Revenue','Website','Description','Priority','Notes'];
    const rows = filtered.map(f => {
      const priority = tags[f.name] === 'top' ? 'Top Priority' : tags[f.name] === 'potential' ? 'Potential' : '';
      return [f.name, f.hq, f.country, f.ownership, f.employees, f.revenue, f.website, f.description||'', priority, f.notes||''].map(v => '"' + (v||'').replace(/"/g,'""') + '"');
    });
    downloadCSV([headers.join(','), ...rows.map(r => r.join(','))].join('\n'));
  }
}

function downloadCSV(csv) {
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const tabName = currentTab === 'actuarial' ? 'actuarial' : currentTab === 'hl' ? 'houlihan_lokey' : 'other';
  a.download = 'firm_tracker_' + tabName + '_export.csv';
  a.click();
}

function exportJSON() {
  const filtered = sortFirms(getFiltered());
  const exportData = filtered.map(f => {
    const obj = Object.assign({}, f);
    const tag = tags[f.name];
    obj.priority = tag === 'top' ? 'Top Priority' : tag === 'potential' ? 'Potential' : '';
    return obj;
  });
  const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const tabName = currentTab === 'actuarial' ? 'actuarial' : currentTab === 'hl' ? 'houlihan_lokey' : 'other';
  a.download = 'firm_tracker_' + tabName + '_export.json';
  a.click();
}

// ===== SIDEBAR TOGGLE =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

// ===== INIT =====
initFilters();
render();
</script>
